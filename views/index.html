<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Unlock Deep Conversations</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-gray-950 text-gray-100 flex items-center justify-center min-h-screen p-4">

    <div class="w-full max-w-md bg-zinc-900 border border-zinc-800 rounded-2xl p-6 shadow-2xl text-center relative overflow-hidden">
        
        <div class="absolute top-0 left-0 right-0 h-1.5 bg-gradient-to-r from-amber-500 via-yellow-400 to-amber-600"></div>

        <div class="mt-4 mb-4 text-amber-500 drop-shadow-[0_0_15px_rgba(245,158,11,0.4)]">
            <i class="fa-solid fa-crown text-6xl animate-pulse"></i>
        </div>

        <h2 class="text-2xl font-bold tracking-wide text-white mb-2">Unlock Deep Conversations</h2>
        <p class="text-zinc-400 text-sm px-4 mb-6">
            Access rules require a one-time activation payment to browse verified profiles and send unlimited messages.
        </p>

        <div class="space-y-4 text-left">
            <div>
                <label for="phone" class="block text-xs font-semibold uppercase tracking-wider text-zinc-400 mb-2">
                    M-Pesa Safaricom Phone Number
                </label>
                <div class="relative">
                    <span class="absolute inset-y-0 left-0 flex items-center pl-3.5 text-zinc-500 text-sm font-medium">
                        +254
                    </span>
                    <input 
                        type="tel" 
                        id="phone" 
                        name="phone"
                        placeholder="712345678" 
                        maxlength="10"
                        class="w-full bg-zinc-950 border border-zinc-800 rounded-xl py-3 pl-14 pr-4 text-white placeholder-zinc-600 focus:outline-none focus:border-amber-500 focus:ring-1 focus:ring-amber-500 transition duration-200"
                    >
                </div>
            </div>

            <button 
                id="stkButton"
                onclick="triggerStkPush()"
                class="w-full mt-2 bg-gradient-to-r from-amber-500 to-amber-600 hover:from-amber-600 hover:to-amber-700 text-zinc-950 font-bold py-3.5 px-4 rounded-xl shadow-lg hover:shadow-amber-500/10 active:scale-[0.99] transition duration-150 flex items-center justify-center space-x-2"
            >
                <span>Pay Ksh 250 via M-Pesa</span>
            </button>

            <button 
                onclick="window.history.back()"
                class="w-full text-zinc-500 hover:text-zinc-400 text-xs font-medium py-2 text-center transition duration-150"
            >
                Cancel Activation
            </button>
        </div>
    </div>

    <script>
        async function triggerStkPush() {
            const phoneInput = document.getElementById('phone');
            const btn = document.getElementById('stkButton');
            
            // Clean out the spacing
            let rawNumber = phoneInput.value.trim();

            // Frontend simple validation validation
            if (!rawNumber) {
                alert("Please type your M-Pesa Safaricom number first.");
                return;
            }

            // UI Loading state adjustments
            btn.disabled = true;
            btn.innerHTML = `
                <svg class="animate-spin h-5 w-5 text-zinc-950" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                    <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                    <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                </svg>
                <span>Sending Prompt...</span>
            `;

            try {
                // Correctly calls the fixed /api/pay-unlock route inside your backend server.js
                const response = await fetch('/api/pay-unlock', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ phone: rawNumber })
                });

                const data = await response.json();

                if (data.success) {
                    alert("🚀 STK Push Sent! Enter your M-Pesa PIN on your phone to complete premium activation.");
                } else {
                    alert("❌ STK request failed: " + (data.error || "Please check network lines."));
                }

            } catch (error) {
                console.error("Payment Gateway Route Error:", error);
                alert("📡 Connection timeout. Could not connect to Safaricom Daraja API.");
            } finally {
                // Restore button back to normal state
                btn.disabled = false;
                btn.innerHTML = `<span>Pay Ksh 250 via M-Pesa</span>`;
            }
        }
    </script>
</body>
</html>
